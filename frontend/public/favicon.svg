<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Subtle inner pentagon (radar hint). -->
  <path
    d="M 122.18 84.24
       Q 128 80 133.82 84.24
       L 179.03 117.22
       Q 184.86 121.46 182.63 128.31
       L 165.31 181.6
       Q 163.08 188.45 155.88 188.45
       L 100.12 188.45
       Q 92.92 188.45 90.69 181.6
       L 73.37 128.31
       Q 71.14 121.46 76.97 117.22
       Z"
    fill="none"
    stroke="#ff3ea5"
    stroke-width="1.5"
    stroke-opacity="0.35"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Outer pentagon. -->
  <path
    d="M 118.29 47.06
       Q 128 40 137.71 47.06
       L 213.39 102.04
       Q 223.1 109.1 219.39 120.51
       L 190.51 209.49
       Q 186.8 220.9 174.8 220.9
       L 81.2 220.9
       Q 69.2 220.9 65.49 209.49
       L 36.61 120.51
       Q 32.9 109.1 42.61 102.04
       Z"
    fill="none"
    stroke="#ff3ea5"
    stroke-width="4.5"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Mint flask: liquid fill. -->
  <path
    d="M 99.3 168
       Q 128 163 156.7 168
       L 170 196
       Q 172 200 168 200
       L 88 200
       Q 84 200 86 196
       Z"
    fill="#3eddb0"
    fill-opacity="0.75"
    filter="url(#glow)"
  />

  <!-- Mint flask: outline. -->
  <path
    d="M 122 84
       L 134 84
       L 134 120
       L 170 196
       Q 172 200 168 200
       L 88 200
       Q 84 200 86 196
       L 122 120
       Z"
    fill="none"
    stroke="#3eddb0"
    stroke-width="5.5"
    stroke-linejoin="round"
    stroke-linecap="round"
    filter="url(#glow)"
  />
</svg>
