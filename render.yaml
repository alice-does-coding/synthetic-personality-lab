services:
  - type: web
    name: spl-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: MISTRAL_API_KEY
        sync: false
      - key: SIMULATION_TICK_SECONDS
        value: 30
      - key: HF_API_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false  # Set to your deployed frontend origin (e.g. https://spl-app.onrender.com)
      - key: DATABASE_URL
        fromDatabase:
          name: spl-db
          property: connectionString

  - type: web
    name: spl-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to https://spl-api.onrender.com/api (or your custom api domain)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: spl-db
    plan: free
