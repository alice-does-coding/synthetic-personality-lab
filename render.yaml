services:
  - type: web
    name: spl-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: MISTRAL_API_KEY
        sync: false
      - key: SIMULATION_TICK_SECONDS
        value: 30
      - key: HF_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false  # The spl-app static-site URL, e.g. https://spl-app-xxxx.onrender.com
                     # (Render appends a random suffix if the bare name is taken).
      - key: DATABASE_URL
        fromDatabase:
          name: spl-db
          property: connectionString

  - type: web
    name: spl-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # The spl-api service URL + /api, e.g. https://spl-api-xxxx.onrender.com/api
                     # (Render appends a random suffix if the bare service name is taken).
                     # Vite resolves import.meta.env at build time, so changing this requires a redeploy.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: spl-db
    plan: free
