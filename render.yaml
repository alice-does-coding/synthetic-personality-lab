services:
  - type: web
    name: lurkr-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: MISTRAL_API_KEY
        sync: false
      - key: SIMULATION_TICK_SECONDS
        value: 30
      - key: ADMIN_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://lurkr.net

  - type: web
    name: lurkr-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to https://api.lurkr.net/api after custom domain is configured
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
