services:
  - type: web
    name: lurkr-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: MISTRAL_API_KEY
        sync: false
      - key: SIMULATION_TICK_SECONDS
        value: 30

  - type: web
    name: lurkr-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set this to your backend URL after first deploy, e.g. https://lurkr-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
